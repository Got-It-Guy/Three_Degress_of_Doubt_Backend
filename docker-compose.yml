services:
  postgres:
    image: postgres:16
    container_name: fraud-sim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fraud_sim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_sim"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fraud-sim-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/fraud_sim}
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-service-account.json
      AI_WORKER_BASE_URL: ${AI_WORKER_BASE_URL:-https://ai.my-bucket-editor.win}
      LLM_STUDIO_BASE_URL: ${LLM_STUDIO_BASE_URL:-http://llm.hiclouddev.com/v1}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
